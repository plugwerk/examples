name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build-cli-example:
    name: Build Java CLI Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Build
        working-directory: plugwerk-java-cli-example
        # --refresh-dependencies: the examples float on io.plugwerk:*:1.1.0-SNAPSHOT.
        # Gradle caches changing (SNAPSHOT) modules for 24h, so without this a
        # restored cache silently tests a stale SDK instead of the latest snapshot.
        run: ./gradlew build --refresh-dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  build-springboot-example:
    name: Build Spring Boot + Thymeleaf Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Build
        working-directory: plugwerk-springboot-thymeleaf-example
        # --refresh-dependencies: see the CLI build job — force re-resolution of
        # the floating io.plugwerk:*:1.1.0-SNAPSHOT rather than a stale cache.
        run: ./gradlew build --refresh-dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
