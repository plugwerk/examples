name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build-cli-example:
    name: Build Java CLI Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build
        working-directory: plugwerk-java-cli-example
        # --refresh-dependencies: the examples float on io.plugwerk:*:1.1.0-SNAPSHOT.
        # Gradle caches changing (SNAPSHOT) modules for 24h, so without this a
        # restored cache silently tests a stale SDK instead of the latest snapshot.
        run: ./gradlew build --refresh-dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  build-springboot-example:
    name: Build Spring Boot + Thymeleaf Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build
        working-directory: plugwerk-springboot-thymeleaf-example
        # --refresh-dependencies: see the CLI build job — force re-resolution of
        # the floating io.plugwerk:*:1.1.0-SNAPSHOT rather than a stale cache.
        run: ./gradlew build --refresh-dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
